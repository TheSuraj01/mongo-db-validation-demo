name: Mongo DB Validation

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      project_type:
        description: 'Select Project Type'
        required: true
        type: choice
        options:
          - LIMS
          - QMS
          - QualityDocs
      vault_name:
        description: 'Select Vault Name'
        required: true
        type: choice
        options:
          - LIMSBasicsDryRun26R1
          - LIMSBasicsDryRun26R2
          - LIMSBasicsDryRun26R3

jobs:
  validate-db:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Backend API
        id: trigger
        run: |
          # Replace $BACKEND_URL with your actual backend or define it in GitHub Secrets.
          # For example, curl -X POST ${{ secrets.BACKEND_URL }}/api/validate-env
          
          echo "Triggering validation for Vault: ${{ inputs.vault_name || 'default_vault' }} and Project: ${{ inputs.project_type || 'default_project' }}"
          
          # Using a mock API logic for now until your real URL is configured:
          TARGET_URL="${{ secrets.BACKEND_URL }}/api/validate-env"
          
          # Fallback to mock response if testing via PR or missing secret
          if [ -z "${{ secrets.BACKEND_URL }}" ]; then
            echo "BACKEND_URL secret is not set! Using mock successful response."
            echo '{"status": "PASS", "summary": "Mock validation passed."}' > response.json
            HTTP_STATUS=200
          else
            HTTP_STATUS=$(curl -s -w "%{http_code}" -o response.json -X POST "$TARGET_URL" \
              -H "Content-Type: application/json" \
              -d '{"vault_name":"${{ inputs.vault_name || 'default' }}", "project_type":"${{ inputs.project_type || 'default' }}"}')
          fi
            
          echo "HTTP Status: $HTTP_STATUS"
          cat response.json || echo "{}"
          
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::error::Backend request failed with status $HTTP_STATUS"
            exit 1
          fi
          
          # Read status from JSON
          if [ -f response.json ]; then
            STATUS=$(jq -r '.status' response.json)
            if [ "$STATUS" == "FAIL" ]; then
              echo "::error::Validation Failed! Check response.json for details."
              exit 1
            else
              echo "Validation Passed!"
            fi
          else
             echo "::error::response.json not found"
             exit 1
          fi
          
      - name: Upload Response Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-response
          path: response.json
          retention-days: 7
